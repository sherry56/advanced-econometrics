<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>高级计量经济学（Ⅱ）复习资料</title>
  <style>
    :root {
      --ink: #1f2933;
      --muted: #657184;
      --line: #d7dee8;
      --panel: #ffffff;
      --soft: #f4f7fb;
      --green: #27695f;
      --blue: #245f9e;
      --orange: #8d5720;
      --shadow: 0 18px 42px rgba(31, 41, 55, 0.1);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      color: var(--ink);
      background: #eef2f6;
      font-family: "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", Arial, sans-serif;
      line-height: 1.65;
    }

    .app {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: #ffffff;
      border-bottom: 1px solid var(--line);
      box-shadow: 0 8px 26px rgba(31, 41, 55, 0.06);
      z-index: 2;
    }

    .header-inner {
      max-width: 1220px;
      margin: 0 auto;
      padding: 24px 24px 18px;
    }

    .eyebrow {
      margin: 0 0 6px;
      color: var(--green);
      font-weight: 700;
      letter-spacing: 0;
    }

    h1 {
      margin: 0;
      font-size: 30px;
      line-height: 1.25;
      letter-spacing: 0;
    }

    .subtitle {
      max-width: 900px;
      margin: 10px 0 0;
      color: var(--muted);
      font-size: 15px;
    }

    .switcher {
      max-width: 1220px;
      margin: 0 auto;
      padding: 14px 24px 16px;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .module-button {
      min-height: 94px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      padding: 14px 16px;
      color: var(--ink);
      text-align: left;
      cursor: pointer;
      box-shadow: 0 6px 18px rgba(31, 41, 55, 0.05);
      transition: border-color 0.15s ease, box-shadow 0.15s ease, transform 0.15s ease;
    }

    .module-button:hover {
      transform: translateY(-1px);
      border-color: #9db9c1;
      box-shadow: 0 12px 28px rgba(31, 41, 55, 0.09);
    }

    .module-button.active {
      border-color: var(--green);
      box-shadow: 0 0 0 3px rgba(39, 105, 95, 0.14), 0 10px 26px rgba(31, 41, 55, 0.08);
    }

    .module-title {
      display: block;
      margin-bottom: 6px;
      font-size: 18px;
      font-weight: 800;
      line-height: 1.35;
    }

    .module-desc {
      display: block;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.5;
    }

    .module-meta {
      display: inline-block;
      margin-top: 8px;
      color: var(--orange);
      font-size: 13px;
      font-weight: 700;
    }

    .viewer-shell {
      width: min(1220px, calc(100% - 48px));
      margin: 18px auto 28px;
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 660px;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .viewer-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 14px;
      border-bottom: 1px solid var(--line);
      background: #f8fafc;
    }

    .viewer-title {
      margin: 0;
      font-weight: 800;
      color: #203648;
    }

    .viewer-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .link-button {
      display: inline-flex;
      align-items: center;
      min-height: 34px;
      padding: 6px 10px;
      border: 1px solid #bfd0dd;
      border-radius: 6px;
      color: #214c67;
      background: #ffffff;
      text-decoration: none;
      font-size: 14px;
      font-weight: 700;
    }

    .link-button:hover {
      border-color: var(--blue);
      color: var(--blue);
    }

    iframe {
      width: 100%;
      height: 78vh;
      min-height: 620px;
      border: 0;
      background: #ffffff;
    }

    @media (max-width: 760px) {
      .header-inner {
        padding: 20px 16px 14px;
      }

      h1 {
        font-size: 24px;
      }

      .switcher {
        grid-template-columns: 1fr;
        padding: 12px 16px 14px;
      }

      .viewer-shell {
        width: calc(100% - 28px);
        margin-top: 14px;
      }

      .viewer-bar {
        align-items: flex-start;
        flex-direction: column;
      }

      iframe {
        height: 76vh;
        min-height: 560px;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <div class="header-inner">
        <p class="eyebrow">高级计量经济学（Ⅱ）</p>
        <h1>期末复习资料</h1>
        <p class="subtitle">
          选择下面的模块，在同一个页面内打开对应内容。选择题练习和模拟实证研究题资料仍然保留为独立文件，后续更新原文件后这里会同步显示。
        </p>
      </div>

      <nav class="switcher" aria-label="复习模块">
        <button class="module-button active" type="button" data-module="quiz">
          <span class="module-title">选择题练习</span>
          <span class="module-desc">章节练习、选择题训练与即时复习。</span>
          <span class="module-meta">点击打开选择题页面</span>
        </button>
        <button class="module-button" type="button" data-module="empirical">
          <span class="module-title">模拟实证研究题复习资料</span>
          <span class="module-desc">模型选择、模型设定、Stata 命令与系数解释模板。</span>
          <span class="module-meta">点击打开实证题页面</span>
        </button>
      </nav>
    </header>

    <main class="viewer-shell">
      <div class="viewer-bar">
        <p class="viewer-title" id="viewerTitle">选择题练习</p>
        <div class="viewer-actions">
          <a class="link-button" id="openStandalone" href="高级计量经济学选择题练习.html" target="_blank" rel="noopener">单独打开</a>
        </div>
      </div>
      <iframe
        id="contentFrame"
        title="选择题练习"
        src="高级计量经济学选择题练习.html">
      </iframe>
    </main>
  </div>

  <script>
    const modules = {
      quiz: {
        title: '选择题练习',
        src: '高级计量经济学选择题练习.html'
      },
      empirical: {
        title: '模拟实证研究题复习资料',
        src: '期末复习/期末复习/模拟实证研究题_面板模型.html'
      }
    };

    const buttons = Array.from(document.querySelectorAll('.module-button'));
    const frame = document.getElementById('contentFrame');
    const viewerTitle = document.getElementById('viewerTitle');
    const standalone = document.getElementById('openStandalone');

    function setModule(key, updateHash = true) {
      const module = modules[key] || modules.quiz;
      buttons.forEach((button) => {
        button.classList.toggle('active', button.dataset.module === key);
      });
      viewerTitle.textContent = module.title;
      frame.title = module.title;
      frame.src = module.src;
      standalone.href = module.src;
      if (updateHash) {
        history.replaceState(null, '', `#${key}`);
      }
    }

    buttons.forEach((button) => {
      button.addEventListener('click', () => setModule(button.dataset.module));
    });

    const initial = location.hash.replace('#', '');
    if (modules[initial]) {
      setModule(initial, false);
    }
  </script>
</body>
</html>
